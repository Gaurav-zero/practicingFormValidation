<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
</head>
<body>
    <form action="" novalidate>
        <label for="email">Enter Email</label>
        <input type="email" name="email" id="email">

        <br>

        <label for="country">Enter country</label>
        <input type="text" name="country" id="country" minlength="2">

        <br>

        <label for="poatalCode">Enter Postal Code</label>
        <input type="number" name="postalCode" id="postalCode" pattern="^[1-9]{1}[0-9]{2}\\s{0, 1}[0-9]{3}$">

        <br>

        <label for="passwd">Enter Password</label>
        <input type="password" name="passwd" id="passwd" required minlength="5">

        <br>

        <label for="confmPasswd">Confirm Password</label>
        <input type="password" name="confmPasswd" id="confmPasswd" required minlength="5">

        <button type="submit">Submit</button>
    </form>    
</body>
</html>
